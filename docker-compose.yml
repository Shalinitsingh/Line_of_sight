services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lineofsight
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/bootstrap.sql:/docker-entrypoint-initdb.d/00-bootstrap.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lineofsight"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db: { condition: service_healthy }
    environment:
      APP_DATABASE_URL: postgresql+asyncpg://app_user:apppass@db:5432/lineofsight
      PROVISIONER_DATABASE_URL: postgresql+asyncpg://provisioner:provpass@db:5432/lineofsight
      JWT_SECRET: change-me-in-prod
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports: ["3000:3000"]
    command: >
      sh -c "python scripts/init_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
